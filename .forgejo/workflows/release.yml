name: Publish to Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 2.20.0-rc1). Leave empty for a timestamped SNAPSHOT.'
        required: false

jobs:
  publish:
    runs-on: docker-node
    permissions:
          contents: read
          packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '18'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Maven
        uses: https://github.com/stCarolas/setup-maven@v5

      - name: Publish
        run: mvn --batch-mode --settings .forgejo/settings.xml -X clean deploy
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
